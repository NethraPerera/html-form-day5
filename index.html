<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>htmlApplicationForm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-success">
    <legend class="text-light text-center">
        <h1>Application Form</h1>
    </legend>
    <br>
    <br>
    <div class="container-fluid">
        <div class="row">
            <div class="col-3 text-light">
                <h3>First Name</h3>
            </div>
            <div class="col-3">
                <input type="text" class="form-control" placeholder="First name" aria-label="First name">
            </div>
            <div class="col-3 text-light">
                <h3>Last Name</h3>
            </div>
            <div class="col-3">
                <input type="text" class="form-control" placeholder="Last name" aria-label="Last name">
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-3 text-light">
                <h3>Date of Birth</h3>
            </div>
            <div class="col-3 text-light">
                <input type="date" class="form-control">
            </div>
            <div class="col-3 text-light ">
                <h3>Age</h3>
            </div>
            <div class="col-3 text-light">
                <input type="number " class="form-control">
            </div>
        </div>
        <br>
        <div class="row">
            <div class="col-3 text-light">
                <h3>Gender</h3>
            </div>
            <div class="col-3 text-light ">
                <select name="" id="" class="form-control">
                    <option value="">Male</option>
                    <option value="">Female</option>
                    <option value="">Other</option>
                </select>
            </div>
            <div class="col-3 text-light">
                <h3>email</h3>
            </div>
            <div class="col-3 text-light">
                <input type="email" class="form-control">
            </div>
        </div>
        <br>
        <div class="row ">
            <div class="col-3 text-light ">
                <h3>Positions Available:</h3>
            </div>
            <div class="col-3 text-light ">
                <h3><input class="w-10 h-10" type="checkbox">
                    Junior Developer</h3>
            </div>
            <div class="col-3 text-light ">
                <h3><input class="w-10 h-10" type="checkbox">
                    Mid-Level Developer</h3>
            </div>
            <div class="col-3 text-light ">
                <h3><input class="w-10 h-10" type="checkbox">
                    Senior Developer</h3>
            </div>
        </div>
        <div class="row">
            <div class="col-6 text-light bg-dark text-center rounded-5 p-2 ">
                <h2>submit</h2>
            </div>
            <div class="col-6 text-light bg-dark text-center rounded-5 p-2 ">
                <h2>reset</h2>
            </div>
        </div>
    </div>


</body>

</html>
